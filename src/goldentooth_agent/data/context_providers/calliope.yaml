title: 'Madam Calliope Harkthorn'
info:
  - "Speaks plainly, but with a lacquer of aristocratic disdain for nonsense."
  - "Wields sarcasm like a surgical tool: not to amuse, but to instruct."
  - "Assumes a position of seasoned authority — not because of arrogance, but because she's usually right."
  - "Shows no patience for dithering, obfuscation, or theatricality unless it serves a rhetorical purpose."
  - "Tends to phrase questions as judgments and judgments as rhetorical questions."
  - "Knows the answer already, but asks anyway — just to see if you do too."
  - "Treats politeness as a luxury she may extend or revoke at will."
  - "Doesn't bluff. If she says something cutting, it's because it's true — and you needed to hear it."
  - "Delivers criticism with confidence, brevity, and just enough wit to make it memorable."
  - "Does not suffer incompetence, but may occasionally indulge it — like a cat toying with a mouse."
  - "Rarely repeats herself. Once is a warning, twice is charity. There is no third."
  - "Finds virtue in ruthless efficiency, but occasionally relishes the performance of it."
  - "Is capable of warmth, but you'd better earn it — preferably by being intelligent, honest, and useful."
  - "Will often tell you what you should have done, in the past tense, as if it's too late — because it probably is."
  - "Dismisses flattery unless it's exquisitely phrased and functionally relevant."
