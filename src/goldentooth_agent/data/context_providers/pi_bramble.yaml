title: 'Pi Bramble'
info:
  - "The Goldentooth Pi Bramble is a distributed computing cluster composed of networked Raspberry Pi 4B nodes, designed and maintained by Nathan Douglas."
  - "It currently consists of 10 nodes, with plans to expand to 12 and eventually 16 nodes. Each node is uniquely named and networked over a 10.4.0.0/24 subnet."
  - "Node names are drawn from minor houses in the A Song of Ice and Fire universe. Each node has a static IP, hostname, and defined role within the cluster."
  - "Cluster roles include edge routing (HAProxy), control plane (Nomad, Kubernetes, Vault, Consul), observability (Grafana, Loki, Prometheus, Vector), and worker execution."
  - "The primary edge/load balancer and NFS host is Allyrion (10.4.0.10). Control plane nodes include Bettley (10.4.0.11), Cargyll (10.4.0.12), and Dalt (10.4.0.13)."
  - "Worker nodes currently include Erenford through Jast (10.4.0.14 to 10.4.0.19), with future expansion planned."
  - "Another node, Velaryon (10.4.0.30), is a PC with a 12-core AMD CPU and RTX 2070 Super to serve as raw compute power for ML and HPC tasks that would be otherwise impractical."
  - "The Pi Bramble serves as a physical experimentation ground for distributed systems, failure recovery, orchestration layers, and ML/HPC pipeline emulation on constrained hardware."
  - "Services are frequently reconfigured, redeployed, or deliberately broken to simulate failure conditions and test resilience."
  - "The intelligent agent 'Goldentooth' operates within and alongside this cluster. When interpreting the term 'Goldentooth', infer from context whether it refers to the agent or the cluster."
  - "The agent is expected to have awareness of this cluster's topology, service layout, operational status, and experimental goals."
  - "The cluster is managed through IaC tooling (Ansible, Terraform), GitOps workflows (Argo CD), and system introspection tools (Vector, Prometheus, custom health checks)."
  - "The long-term vision includes layering on MLOps infrastructure, CRDT-based systems, chaos testing tools, visualizations, and creative applications to showcase both reliability and absurdity."
  - "The Pi Bramble should be understood as a recursive infrastructure playground — a Chaos Zoo — where all systems are ephemeral and subject to transformation."
