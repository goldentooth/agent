  docstring: Generate optimization suggestions for a flow graph.
  public: true
- name: export_flow_analysis
  signature: 'def export_flow_analysis(graph: FlowGraph, filepath: str) -> None'
  docstring: Export comprehensive flow analysis to JSON file.
  public: true
