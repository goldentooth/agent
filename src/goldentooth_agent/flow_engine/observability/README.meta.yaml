- name: analyze_flow_composition
  signature: 'def analyze_flow_composition(flows: FlowList) -> FlowGraph'
  docstring: Analyze a composition of multiple flows.
  public: true
- name: detect_flow_patterns
  signature: 'def detect_flow_patterns(graph: FlowGraph) -> PatternList'
  docstring: Detect common patterns in a flow graph.
  public: true
- name: generate_flow_optimizations
