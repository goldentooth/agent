  signature: def get_flow_analyzer() -> FlowAnalyzer
  docstring: Get the global flow analyzer instance.
  public: true
- name: health_check_stream
  signature: 'def health_check_stream(health_monitor: FlowHealthMonitor | None) ->
    HealthCheckStream'
  docstring: "Create a flow that performs health checks during stream processing.\n\
    \n    Args:\n        health_monitor: Optional health monitor instance. Uses global\
    \ if None.\n\n    Returns:\n        A flow that runs health checks and passes\
    \ items through unchanged."
  public: true
- name: get_health_monitor
  signature: def get_health_monitor() -> FlowHealthMonitor
  docstring: Get the global health monitor instance.
  public: true
- name: get_config_validator
  signature: def get_config_validator() -> FlowConfigValidator
  docstring: Get the global configuration validator instance.
  public: true
- name: check_system_health
  signature: async def check_system_health() -> SystemHealth
  docstring: Check overall system health.
  public: true
- name: validate_flow_configuration
  signature: 'def validate_flow_configuration(config: ConfigData) -> list[str]'
  docstring: Validate flow configuration.
  public: true
- name: register_health_check
  signature: 'def register_health_check(name: str, description: str, check_function:
    Callable[[], AsyncIterator[bool]], **kwargs: AnyValue) -> None'
  docstring: Register a custom health check.
  public: true
- name: export_health_report
  signature: 'def export_health_report(filepath: str) -> None'
  docstring: Export system health report to file.
  public: true
- name: debug_stream
  signature: 'def debug_stream(breakpoint_condition: ItemCondition | None, log_items:
    bool) -> Flow[Input, Input]'
  docstring: "Create a flow that adds debugging capabilities to the pipeline.\n\n\
    \    Args:\n        breakpoint_condition: Optional condition to trigger breakpoints\n\
    \        log_items: Whether to log items as they pass through\n\n    Returns:\n\
    \        A flow that provides debugging and passes items through unchanged."
  public: true
- name: traced_flow
  signature: 'def traced_flow(flow: Flow[Input, Output]) -> Flow[Input, Output]'
  docstring: "Wrap a flow with execution tracing and enhanced error reporting.\n\n\
    \    Args:\n        flow: The flow to wrap with tracing\n\n    Returns:\n    \
    \    A flow with enhanced debugging and error reporting."
  public: true
- name: get_flow_debugger
  signature: def get_flow_debugger() -> FlowDebugger
  docstring: Get the global flow debugger instance.
  public: true
- name: enable_flow_debugging
  signature: def enable_flow_debugging() -> None
  docstring: Enable flow debugging globally.
  public: true
- name: disable_flow_debugging
  signature: def disable_flow_debugging() -> None
  docstring: Disable flow debugging globally.
  public: true
- name: add_flow_breakpoint
  signature: 'def add_flow_breakpoint(flow_name: str, condition: BreakpointCondition)
    -> None'
  docstring: Add a breakpoint for a specific flow.
  public: true
- name: remove_flow_breakpoint
  signature: 'def remove_flow_breakpoint(flow_name: str) -> None'
  docstring: Remove a breakpoint for a flow.
  public: true
- name: get_execution_trace
  signature: def get_execution_trace() -> TraceData
  docstring: Get the current execution trace.
  public: true
- name: export_execution_trace
  signature: 'def export_execution_trace(filepath: str) -> None'
  docstring: Export execution trace to a JSON file.
  public: true
- name: inspect_flow
  signature: 'def inspect_flow(flow: AnyFlow) -> DebugData'
  docstring: "Inspect a flow and return metadata about its structure.\n\n    Args:\n\
    \        flow: The flow to inspect\n\n    Returns:\n        Dictionary containing\
    \ flow metadata and structure information."
  public: true
- name: debug_session
  signature: 'async def debug_session(enable_breakpoints: bool) -> AsyncGenerator[FlowDebugger]'
  docstring: "Context manager for a temporary debugging session.\n\n    Args:\n  \
    \      enable_breakpoints: Whether to enable breakpoint functionality\n\n    Example:\n\
    \        async with debug_session():\n            # All flows will have debugging\
    \ enabled\n            result = await my_flow.to_list(test_stream)"
  public: true
- name: monitored_stream
  signature: 'def monitored_stream(monitor_name: str | None) -> Callable[[Callable[[],
    AnyFlow]], AnyFlow]'
  docstring: "Decorator to add performance monitoring to a Flow.\n\n    Args:\n  \
    \      monitor_name: Optional custom name for monitoring. Defaults to flow name.\n\
    \n    Returns:\n        Decorated flow with performance monitoring.\n\n    Example:\n\
    \        @monitored_stream(\"my_pipeline\")\n        def my_flow():\n        \
    \    return Flow(...)"
  public: true
- name: performance_stream
  signature: def performance_stream() -> AnyFlow
  docstring: "Create a flow that adds performance monitoring to the pipeline.\n\n\
    \    This combinator automatically tracks timing, throughput, and memory usage\n\
    \    for the stream processing without requiring decoration.\n\n    Returns:\n\
    \        A flow that monitors performance and passes items through unchanged."
  public: true
- name: benchmark_stream
  signature: 'def benchmark_stream(iterations: int, warmup_iterations: int) -> Callable[[AnyFlow],
    Callable[[AnyIteratorFactory], Awaitable[BenchmarkResult]]]'
  docstring: "Benchmark a Flow's performance over multiple iterations.\n\n    Args:\n\
    \        iterations: Number of benchmark iterations to run\n        warmup_iterations:\
    \ Number of warmup iterations (not counted in results)\n\n    Returns:\n     \
    \   Function that benchmarks the given flow and returns performance stats.\n\n\
    \    Example:\n        benchmark = benchmark_stream(iterations=1000)\n       \
    \ stats = await benchmark(my_flow)\n        print(f\"Average duration: {stats['avg_duration_ms']:.2f}ms\"\
    )"
  public: true
- name: get_performance_monitor
  signature: def get_performance_monitor() -> PerformanceMonitor
  docstring: Get the global performance monitor instance.
  public: true
- name: enable_memory_tracking
  signature: def enable_memory_tracking() -> None
  docstring: Enable memory tracking for all monitored flows.
  public: true
- name: get_performance_summary
  signature: def get_performance_summary() -> PerformanceData
  docstring: Get summary of all performance metrics.
  public: true
- name: export_performance_metrics
  signature: 'def export_performance_metrics(filepath: str) -> None'
  docstring: Export all performance metrics to a JSON file.
  public: true
