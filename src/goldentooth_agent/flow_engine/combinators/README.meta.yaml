  docstring: Create a flow that filters stream items based on a predicate.
  public: true
- name: map_stream
  signature: 'def map_stream(fn: Callable[[Input], Output]) -> Flow[Input, Output]'
  docstring: Create a flow that maps a function over each item in the stream.
  public: true
- name: flat_map_stream
  signature: 'def flat_map_stream(fn: Callable[[Input], AsyncIterator[Output]]) ->
