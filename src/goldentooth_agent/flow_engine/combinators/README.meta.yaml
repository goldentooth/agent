functions:
- name: race_stream
  signature: 'def race_stream(*flows: Flow[Input, Output]) -> Flow[Input, Output]'
  docstring: "Create a flow that races multiple flows and yields the first result.\n\
    \n    For each input item, runs all flows in parallel and yields the result\n\
    \    from whichever flow completes first.\n\n    Args:\n        *flows: Flows\
    \ to race against each other\n\n    Returns:\n        A flow that yields first\
    \ results from racing flows"
  public: true
- name: parallel_stream
  signature: 'def parallel_stream(*flows: Flow[Input, Output]) -> Flow[Input, list[Output]]'
  docstring: "Create a flow that runs multiple flows in parallel and collects all\
    \ results.\n\n    For each input item, runs all flows in parallel and yields a\
    \ list of all results.\n\n    Args:\n        *flows: Flows to run in parallel\n\
    \n    Returns:\n        A flow that yields lists of results from parallel execution"
  public: true
- name: parallel_stream_successful
  signature: 'def parallel_stream_successful(*flows: Flow[Input, Output]) -> Flow[Input,
    list[Output]]'
  docstring: "Create a flow that runs flows in parallel and yields only successful\
    \ results.\n\n    Ignores flows that raise exceptions and yields results from\
    \ successful flows only.\n\n    Args:\n        *flows: Flows to run in parallel\n\
    \n    Returns:\n        A flow that yields lists of successful results"
  public: true
- name: zip_stream
  signature: 'def zip_stream(other: AsyncIterator[OtherInput]) -> Flow[Input, tuple[Input,
    OtherInput]]'
  docstring: "Create a flow that zips items with another stream.\n\n    Pairs each\
    \ item from the main stream with the corresponding item\n    from the other stream.\n\
    \n    Args:\n        other: The other stream to zip with\n\n    Returns:\n   \
    \     A flow that yields tuples of paired items"
  public: true
- name: chain_stream
  signature: 'def chain_stream(*streams: AsyncIterator[Input]) -> Flow[None, Input]'
  docstring: "Create a flow that chains multiple streams sequentially.\n\n    Yields\
    \ all items from the first stream, then all from the second, etc.\n\n    Args:\n\
    \        *streams: Streams to chain together\n\n    Returns:\n        A flow that\
    \ yields items from all streams in sequence"
  public: true
- name: merge_stream
  signature: 'def merge_stream(*flows: Flow[Input, Output]) -> Flow[Input, Output]'
  docstring: "Create a flow that merges results from multiple flows concurrently.\n\
    \n    Runs all flows on the same input stream and merges their outputs\n    as\
    \ they become available.\n\n    Args:\n        *flows: Flows to merge\n\n    Returns:\n\
    \        A flow that yields merged results from all flows"
  public: true
- name: merge_flows
  signature: 'def merge_flows(*flows: Flow[Input, Input]) -> Flow[Input, Input]'
  docstring: "Create a flow that merges multiple flows that operate on the same input.\n\
    \n    Similar to merge_stream but for flows that have the same input/output types.\n\
    \n    Args:\n        *flows: Flows to merge (must have same input/output types)\n\
    \n    Returns:\n        A flow that merges all input flows"
  public: true
- name: combine_latest_stream
  signature: 'def combine_latest_stream(other: AsyncIterator[OtherInput]) -> Flow[Input,
    tuple[Input, OtherInput]]'
  docstring: "Create a flow that combines items with the latest value from another\
    \ stream.\n\n    For each item in the main stream, emits a tuple with that item\
    \ and\n    the most recent item from the other stream.\n\n    Args:\n        other:\
    \ The other stream to combine with\n\n    Returns:\n        A flow that yields\
    \ tuples of (current_item, latest_other_item)"
  public: true
- name: flat_map_ctx_stream
  signature: 'def flat_map_ctx_stream(fn: Callable[[Output, Input], AsyncIterator[Newput]])
    -> Flow[Input, Newput]'
  docstring: "Create a flow that flat-maps with access to both item and original context.\n\
    \n    Unlike flat_map_stream which only gets the current item, this passes both\n\
    \    the current item and the original stream input to the mapping function.\n\
    \n    Args:\n        fn: Function that takes (current_item, original_input) and\
    \ returns async iterator\n\n    Returns:\n        A flow that flat-maps with context\
    \ access"
  public: true
- name: merge_async_generators
  signature: 'async def merge_async_generators(*generators: AsyncIterator[Input])
    -> AsyncIterator[Input]'
  docstring: "Utility function to merge multiple async generators.\n\n    This is\
    \ a utility function used by other combinators to merge async iterators.\n\n \
    \   Args:\n        *generators: Async generators to merge\n\n    Returns:\n  \
    \      Async iterator that yields from all generators concurrently"
  public: true
- name: delay_stream
  signature: 'def delay_stream(seconds: float) -> Flow[Input, Input]'
  docstring: Create a flow that delays each item in the stream by a given number of
    seconds.
  public: true
- name: debounce_stream
  signature: 'def debounce_stream(seconds: float) -> Flow[Input, Input]'
  docstring: Create a flow that debounces stream items by waiting for a quiet period.
  public: true
- name: throttle_stream
  signature: 'def throttle_stream(rate_per_second: float) -> Flow[Input, Input]'
  docstring: "Create a flow that throttles the rate of item processing.\n\n    Ensures\
    \ that items are processed at most at the specified rate,\n    introducing delays\
    \ as necessary.\n\n    Args:\n        rate_per_second: Maximum items per second\
    \ to process\n\n    Returns:\n        A flow that throttles processing rate"
  public: true
- name: timeout_stream
  signature: 'def timeout_stream(seconds: float) -> Flow[Input, Input]'
  docstring: "Create a flow that adds a timeout to each item's processing.\n\n   \
    \ If processing an item takes longer than the specified timeout,\n    a TimeoutError\
    \ is raised.\n\n    Args:\n        seconds: Maximum time to wait for each item\n\
    \n    Returns:\n        A flow that enforces timeouts on item processing"
  public: true
- name: sample_stream
  signature: 'def sample_stream(interval: float) -> Flow[Input, Input]'
  docstring: "Create a flow that samples the stream at regular intervals.\n\n    Emits\
    \ the most recent item at each interval. If no new items have arrived\n    since\
    \ the last sample, nothing is emitted. Essential for rate limiting\n    and real-time\
    \ applications.\n\n    Args:\n        interval: Sampling interval in seconds\n\
    \n    Returns:\n        A flow that samples items at regular intervals"
  public: true
- name: batch_stream
  signature: 'def batch_stream(size: int) -> Flow[Input, list[Input]]'
  docstring: Create a flow that batches stream items into lists of specified size.
  public: true
- name: chunk_stream
  signature: 'def chunk_stream(size: int) -> Flow[Input, list[Input]]'
  docstring: "Create a flow that groups items into fixed-size chunks.\n\n    Similar\
    \ to batch_stream but emphasizes the chunking concept.\n\n    Args:\n        size:\
    \ Number of items per chunk\n\n    Returns:\n        A flow that yields lists\
    \ of items"
  public: true
- name: window_stream
  signature: 'def window_stream(size: int, step: int) -> Flow[Input, list[Input]]'
  docstring: "Create a flow that generates sliding windows over the stream.\n\n  \
    \  Creates overlapping windows of items with specified size and step.\n\n    Args:\n\
    \        size: Window size\n        step: Step size between windows (default 1)\n\
    \n    Returns:\n        A flow that yields sliding windows"
  public: true
- name: scan_stream
  signature: 'def scan_stream(fn: Callable[[Output, Input], Output], initial: Output)
    -> Flow[Input, Output]'
  docstring: "Create a flow that performs a running accumulation with intermediate\
    \ results.\n\n    Like a fold/reduce but emits all intermediate accumulator values.\n\
    \n    Args:\n        fn: Accumulator function\n        initial: Initial accumulator\
    \ value\n\n    Returns:\n        A flow that yields intermediate accumulation\
    \ results"
  public: true
- name: group_by_stream
  signature: 'def group_by_stream(key_fn: Callable[[Input], K]) -> Flow[Input, tuple[K,
    list[Input]]]'
  docstring: "Create a flow that groups items by a key function.\n\n    Collects all\
    \ items with the same key and emits them as groups.\n\n    Args:\n        key_fn:\
    \ Function that extracts grouping key from each item\n\n    Returns:\n       \
    \ A flow that yields (key, items) tuples"
  public: true
- name: distinct_stream
  signature: 'def distinct_stream(key_fn: Callable[[Input], K] | None) -> Flow[Input,
    Input]'
  docstring: "Create a flow that filters out duplicate items.\n\n    Uses a key function\
    \ to determine uniqueness, or the items themselves if no key function.\n\n   \
    \ Args:\n        key_fn: Optional function to extract comparison key (defaults\
    \ to item itself)\n\n    Returns:\n        A flow that yields only distinct items"
  public: true
- name: pairwise_stream
  signature: def pairwise_stream() -> Flow[Input, tuple[Input, Input]]
  docstring: "Create a flow that emits consecutive pairs of items.\n\n    Emits tuples\
    \ of (previous_item, current_item) for each item after the first.\n\n    Returns:\n\
    \        A flow that yields consecutive pairs"
  public: true
- name: memoize_stream
  signature: 'def memoize_stream(key_fn: Callable[[Input], K]) -> Flow[Input, Input]'
  docstring: "Create a flow that caches items based on a key function.\n\n    Items\
    \ with the same key are only processed once; subsequent items\n    with the same\
    \ key yield the cached result.\n\n    Args:\n        key_fn: Function that extracts\
    \ caching key from each item\n\n    Returns:\n        A flow that caches items\
    \ by key"
  public: true
- name: buffer_stream
  signature: 'def buffer_stream(trigger: AsyncIterator[AnyValue]) -> Flow[Input, list[Input]]'
  docstring: "Create a flow that buffers items until a trigger emits.\n\n    Collects\
    \ items in a buffer and emits the buffer contents when\n    the trigger stream\
    \ produces a value.\n\n    Args:\n        trigger: Stream that triggers buffer\
    \ emission\n\n    Returns:\n        A flow that buffers items until triggered"
  public: true
- name: expand_stream
  signature: 'def expand_stream(expander: Callable[[Input], AsyncIterator[Input]],
    max_depth: int) -> Flow[Input, Input]'
  docstring: "Create a flow that recursively expands items using an expander function.\n\
    \n    Applies the expander function to each item and recursively processes\n \
    \   the results until no more expansions are possible or max depth is reached.\n\
    \n    Args:\n        expander: Function that expands an item into multiple items\n\
    \        max_depth: Maximum recursion depth\n\n    Returns:\n        A flow that\
    \ recursively expands items"
  public: true
- name: finalize_stream
  signature: 'def finalize_stream(finalizer: Callable[[], AnyValue]) -> Flow[Input,
    Input]'
  docstring: "Create a flow that executes a finalizer function when the stream completes.\n\
    \n    The finalizer is called whether the stream completes normally or with an\
    \ error.\n\n    Args:\n        finalizer: Function to call when stream processing\
    \ finishes\n\n    Returns:\n        A flow that executes cleanup on completion"
  public: true
- name: if_then_stream
  signature: 'def if_then_stream(predicate: Callable[[Input], bool], then_flow: Flow[Input,
    Output], else_flow: Flow[Input, Output] | None) -> Flow[Input, Output]'
  docstring: "Create a flow that conditionally applies different flows based on a\
    \ predicate.\n\n    For each item in the stream, evaluates the predicate and applies\
    \ either\n    the then_flow or else_flow accordingly.\n\n    Args:\n        predicate:\
    \ Function that determines which flow to apply\n        then_flow: Flow to apply\
    \ when predicate returns True\n        else_flow: Flow to apply when predicate\
    \ returns False (optional)\n\n    Returns:\n        A flow that conditionally\
    \ processes items"
  public: true
- name: retry_stream
  signature: 'def retry_stream(n: int, flow: Flow[Input, Output]) -> Flow[Input, Output]'
  docstring: Create a flow that retries processing items with another flow on failure.
  public: true
- name: recover_stream
  signature: 'def recover_stream(handler: Callable[[Exception, Input], Awaitable[Output]])
    -> Flow[Input, Output]'
  docstring: "Create a flow that handles exceptions and provides fallback values.\n\
    \n    When an exception occurs during stream processing, the handler function\n\
    \    is called with the exception and the current item to provide a fallback value."
  public: true
- name: switch_stream
  signature: 'def switch_stream(selector: Callable[[Input], str], cases: dict[str,
    Flow[Input, Output]], default: Flow[Input, Output] | None) -> Flow[Input, Output]'
  docstring: "Create a flow that routes items to different flows based on a selector\
    \ function.\n\n    For each item, applies the selector function to determine which\
    \ case flow\n    to use for processing.\n\n    Args:\n        selector: Function\
    \ that returns a case key for each item\n        cases: Dictionary mapping case\
    \ keys to flows\n        default: Optional default flow for unmatched cases\n\n\
    \    Returns:\n        A flow that routes items based on selector"
  public: true
- name: while_condition_stream
  signature: 'def while_condition_stream(condition: Callable[[Input], bool], transform:
    Flow[Input, Output]) -> Flow[Input, Output]'
  docstring: "Create a flow that applies a transformation while a condition is true.\n\
    \n    Continues processing items with the transform flow as long as the condition\n\
    \    returns True for each item.\n\n    Args:\n        condition: Function that\
    \ determines whether to continue processing\n        transform: Flow to apply\
    \ while condition is true\n\n    Returns:\n        A flow that processes while\
    \ condition holds"
  public: true
- name: circuit_breaker_stream
  signature: 'def circuit_breaker_stream(failure_threshold: int, recovery_timeout:
    float) -> Flow[Input, Input]'
  docstring: "Create a flow that implements the circuit breaker pattern.\n\n    Tracks\
    \ failures and \"opens\" the circuit after too many failures,\n    preventing\
    \ further processing until a recovery timeout elapses.\n\n    Args:\n        failure_threshold:\
    \ Number of failures before opening circuit\n        recovery_timeout: Seconds\
    \ to wait before attempting recovery\n\n    Returns:\n        A flow that implements\
    \ circuit breaker behavior"
  public: true
- name: catch_and_continue_stream
  signature: 'def catch_and_continue_stream(handler: Callable[[Exception], AnyValue]
    | None) -> Flow[Input, Input]'
  docstring: "Create a flow that catches exceptions and continues processing.\n\n\
    \    When an exception occurs, optionally calls a handler function and\n    continues\
    \ with the next item instead of propagating the exception.\n\n    Args:\n    \
    \    handler: Optional function to handle exceptions\n\n    Returns:\n       \
    \ A flow that catches exceptions and continues processing"
  public: true
- name: tap_stream
  signature: 'def tap_stream(side_effect: Callable[[Input], AnyValue]) -> Flow[Input,
    Input]'
  docstring: "Create a flow that applies a side effect to each item without changing\
    \ the stream.\n\n    Useful for logging, debugging, or triggering side effects\
    \ while preserving\n    the original stream data.\n\n    Args:\n        side_effect:\
    \ Function to call for each item (can be sync or async)\n\n    Returns:\n    \
    \    A flow that applies side effects and passes items through"
  public: true
- name: then_stream
  signature: 'def then_stream(side_effect: Callable[[Input], AnyValue]) -> Flow[Input,
    Input]'
  docstring: "Create a flow that applies a side effect sequentially after each item.\n\
    \n    Similar to tap_stream but emphasizes sequential execution.\n\n    Args:\n\
    \        side_effect: Function to call for each item (can be sync or async)\n\n\
    \    Returns:\n        A flow that applies side effects sequentially"
  public: true
- name: chain_flows
  signature: 'def chain_flows(*flows: Flow[Input, Input]) -> Flow[Input, Input]'
  docstring: "Create a flow that chains multiple flows sequentially.\n\n    Applies\
    \ each flow in sequence to the same input stream.\n    Each flow processes the\
    \ original stream independently.\n\n    Args:\n        *flows: Flows to chain\
    \ sequentially\n\n    Returns:\n        A flow that applies all flows to the input\
    \ stream"
  public: true
- name: branch_flows
  signature: 'def branch_flows(predicate: Callable[[Input], bool], true_flow: Flow[Input,
    Output], false_flow: Flow[Input, Output] | None) -> Flow[Input, Output]'
  docstring: "Create a flow that branches processing based on a predicate.\n\n   \
    \ Splits the input stream and applies different flows to items based\n    on the\
    \ predicate result.\n\n    Args:\n        predicate: Function that determines\
    \ which branch to take\n        true_flow: Flow for items where predicate returns\
    \ True\n        false_flow: Flow for items where predicate returns False\n\n \
    \   Returns:\n        A flow that branches processing based on predicate"
  public: true
- name: log_stream
  signature: 'def log_stream(name: str) -> Flow[Input, Input]'
  docstring: "Create a flow that logs each stream item and passes it through unchanged.\n\
    \n    Useful for debugging flow pipelines by observing intermediate values\n \
    \   without affecting the data flow.\n\n    Args:\n        name: Name for the\
    \ flow (used in pipeline visualization)\n        prefix: Optional prefix to add\
    \ before the logged item\n        level: Logging level (defaults to DEBUG)"
  public: true
- name: trace_stream
  signature: 'def trace_stream(tracer: Callable[[str, AnyValue], None]) -> Flow[Input,
    Input]'
  docstring: "Create a flow that provides detailed tracing of stream processing.\n\
    \n    Calls the tracer function for each item with event type and item data.\n\
    \    Useful for debugging and monitoring stream behavior.\n\n    Args:\n     \
    \   tracer: Function that receives (event_type, item) for tracing\n\n    Returns:\n\
    \        A flow that traces processing and passes items through"
  public: true
- name: metrics_stream
  signature: 'def metrics_stream(counter: Callable[[str], None]) -> Flow[Input, Input]'
  docstring: "Create a flow that emits metrics for stream processing.\n\n    Calls\
    \ the counter function with metric names as items are processed.\n    Useful for\
    \ monitoring and observability.\n\n    Args:\n        counter: Function that receives\
    \ metric names\n\n    Returns:\n        A flow that emits metrics and passes items\
    \ through"
  public: true
- name: inspect_stream
  signature: 'def inspect_stream(inspector: Callable[[Input, dict[str, AnyValue]],
    None]) -> Flow[Input, Input]'
  docstring: "Create a flow that inspects stream items with context metadata.\n\n\
    \    Calls the inspector function with each item and a context dictionary\n  \
    \  containing processing metadata. Useful for debugging and analysis.\n\n    Args:\n\
    \        inspector: Function that receives (item, context_dict)\n\n    Returns:\n\
    \        A flow that inspects items and passes them through"
  public: true
- name: materialize_stream
  signature: def materialize_stream() -> Flow[Input, StreamNotification]
  docstring: "Create a flow that converts items and errors into notification objects.\n\
    \n    Converts the stream into a meta-stream where each emission is a notification\n\
    \    about what happened (OnNext, OnError, OnComplete). Allows treating errors\n\
    \    as values for complex error handling patterns.\n\n    Returns:\n        A\
    \ flow that yields StreamNotification objects"
  public: true
- name: range_flow
  signature: 'def range_flow(start: int, stop: int, step: int) -> Flow[None, int]'
  docstring: Create a flow that generates a range of integers.
  public: true
- name: repeat_flow
  signature: 'def repeat_flow(value: A, times: int | None) -> Flow[None, A]'
  docstring: Create a flow that repeats a value a specified number of times (or infinitely).
  public: true
- name: empty_flow
  signature: def empty_flow() -> Flow[None, AnyValue]
  docstring: Create a flow that produces no items.
  public: true
- name: start_with_stream
  signature: 'def start_with_stream(*items: Input) -> Flow[Input, Input]'
  docstring: "Create a flow that prepends specified items to the beginning of the\
    \ stream.\n\n    Very useful for providing default values, initialization, or\
    \ ensuring\n    non-empty streams.\n\n    Args:\n        *items: Items to prepend\
    \ to the stream\n\n    Returns:\n        A flow that starts with the specified\
    \ items, then continues with stream items"
  public: true
- name: run_fold
  signature: 'async def run_fold(initial_stream: AsyncIterator[Input], steps: list[Flow[Input,
    Input]]) -> AsyncIterator[Input]'
  docstring: "Execute a list of flows sequentially, piping the stream through each\
    \ step.\n\n    This is a fold/reduce operation where each flow receives the output\
    \ stream of the\n    previous flow as its input. Useful for building sequential\
    \ processing pipelines.\n\n    Args:\n        initial_stream: The initial input\
    \ stream\n        steps: List of flows to execute in order\n\n    Returns:\n \
    \       The final output stream after all steps have been executed\n\n    Example:\n\
    \        increment_flow = Flow.from_sync_fn(lambda x: x + 1)\n        double_flow\
    \ = Flow.from_sync_fn(lambda x: x * 2)\n        input_stream = async_range(3)\
    \  # [0, 1, 2]\n        result_stream = run_fold(input_stream, [increment_flow,\
    \ double_flow])\n        # Result: [2, 4, 6] -> (0+1)*2, (1+1)*2, (2+1)*2"
  public: true
- name: compose
  signature: 'def compose(first: Flow[A, B], second: Flow[B, C]) -> Flow[A, C]'
  docstring: Compose two flows, where the output of the first is the input to the
    second.
  public: true
- name: filter_stream
  signature: 'def filter_stream(predicate: Callable[[Input], bool]) -> Flow[Input,
