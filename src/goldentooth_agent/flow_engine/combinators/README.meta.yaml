  docstring: Create a flow that flat-maps a function over each item in the stream.
  public: true
- name: identity_stream
  signature: def identity_stream() -> Flow[Input, Input]
  docstring: Create a flow that passes the stream through unchanged.
  public: true
- name: take_stream
  signature: 'def take_stream(n: int) -> Flow[Input, Input]'
  docstring: Create a flow that takes the first n items from the stream.
  public: true
- name: skip_stream
  signature: 'def skip_stream(n: int) -> Flow[Input, Input]'
  docstring: Create a flow that skips the first n items from the stream.
  public: true
- name: guard_stream
  signature: 'def guard_stream(predicate: Callable[[Input], bool], message: str) ->
    Flow[Input, Input]'
  docstring: "Create a flow that validates items or raises an exception.\n\n    Args:\n\
    \        predicate: Function that returns True for valid items\n        message:\
    \ Error message if validation fails\n\n    Raises:\n        FlowValidationError:\
    \ If any item fails the guard condition"
  public: true
- name: flatten_stream
  signature: def flatten_stream() -> Flow[AsyncIterator[Input], Input]
  docstring: Create a flow that flattens nested async iterators.
  public: true
- name: collect_stream
  signature: def collect_stream() -> Flow[Input, list[Input]]
  docstring: Create a flow that collects all items into a single list.
  public: true
- name: until_stream
  signature: 'def until_stream(predicate: Callable[[Input], bool]) -> Flow[Input,
    Input]'
  docstring: "Create a flow that processes items until a predicate becomes true.\n\
    \n    Once the predicate returns True for an item, that item is yielded\n    and\
    \ processing stops (the predicate item is included in output).\n\n    Args:\n\
    \        predicate: Function that determines when to stop processing\n\n    Returns:\n\
    \        A flow that processes until predicate is satisfied"
  public: true
- name: share_stream
  signature: def share_stream() -> Flow[Input, Input]
  docstring: Create a flow that shares a single stream subscription among multiple
    subscribers.
  public: true
- name: get_function_name
  signature: 'def get_function_name(fn: AnyCallable) -> str'
  docstring: Extract function name for flow naming.
  public: true
- name: create_single_item_stream
  signature: 'def create_single_item_stream(item: Input) -> AsyncIterator[Input]'
  docstring: Create an async iterator that yields a single item.
  public: true
