- name: safe_getattr
  signature: 'def safe_getattr(obj: Any, attr: str, default: Any, context: dict[str,
    Any] | None) -> Any'
  docstring: "Safe attribute access with enhanced error reporting.\n\n    This function\
    \ provides enhanced debugging context when attribute access fails,\n    including\
    \ suggestions for debugging tools and common fixes.\n\n    Args:\n        obj:\
    \ Object to access attribute from\n        attr: Attribute name to access\n  \
    \      default: Default value if attribute doesn't exist\n        context: Additional\
    \ context for error reporting\n\n    Returns:\n        The attribute value or\
    \ default\n\n    Raises:\n        DetailedAttributeError: When attribute doesn't\
    \ exist and no default.\n                              The error includes debugging\
    \ suggestions and tool recommendations.\n\n    Example:\n        >>> # Safe access\
    \ with debugging context\n        >>> value = safe_getattr(response, \"response\"\
    , context={\n        ...     \"operation\": \"agent_processing\",\n        ...\
    \     \"expected_type\": \"AgentResponse object\"\n        ... })"
  public: true
- name: safe_dict_access
  signature: 'def safe_dict_access(obj: dict[str, Any], key: str, default: Any, context:
    dict[str, Any] | None) -> Any'
  docstring: "Safe dictionary access with enhanced error reporting.\n\n    This function\
    \ provides enhanced debugging context when dictionary access fails,\n    including\
    \ suggestions for debugging tools and common fixes.\n\n    Args:\n        obj:\
    \ Dictionary to access\n        key: Key to look up\n        default: Default\
    \ value if key doesn't exist\n        context: Additional context for error reporting\n\
    \n    Returns:\n        The value or default\n\n    Raises:\n        DetailedAttributeError:\
    \ When key doesn't exist and no default.\n                              The error\
    \ includes debugging suggestions and tool recommendations.\n\n    Example:\n \
    \       >>> # Safe access with debugging context\n        >>> value = safe_dict_access(response_dict,\
    \ \"response\", context={\n        ...     \"operation\": \"agent_response_parsing\"\
    ,\n        ...     \"expected_keys\": [\"response\", \"sources\", \"metadata\"\
    ]\n        ... })"
  public: true
- name: maybe_await
  signature: 'async def maybe_await(func: Callable[..., T], *args: object, **kwargs:
    object) -> T'
  docstring: "Call a function and conditionally await its result if it returns a coroutine.\n\
    \n    This utility enables uniform handling of both synchronous and asynchronous\
    \ functions\n    in contexts where you don't know ahead of time whether the function\
    \ is async.\n    Useful for building flexible APIs that accept either sync or\
    \ async callables.\n\n    Args:\n        func: The callable to execute (can be\
    \ sync or async)\n        *args: Positional arguments to pass to the function\n\
    \        **kwargs: Keyword arguments to pass to the function\n\n    Returns:\n\
    \        The result of the function call, awaited if it was a coroutine\n\n  \
    \  Example:\n        # Works with both sync and async functions\n        result1\
    \ = await maybe_await(lambda x: x + 1, 5)  # Returns 6\n        result2 = await\
    \ maybe_await(async_function, arg1, kwarg=value)"
  public: true
