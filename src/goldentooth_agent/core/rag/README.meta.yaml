    docstring: "Answer a question using RAG with retrieved documents.\n\n        Args:\n\
      \            question: User's question\n            max_results: Maximum number\
      \ of documents/chunks to retrieve\n            store_type: Optional filter by\
      \ document store type\n            include_metadata: Whether to include retrieval\
      \ metadata in response\n            similarity_threshold: Minimum similarity\
      \ score for retrieved documents\n            include_chunks: Whether to include\
      \ chunks in search results\n            chunk_types: Optional filter for specific\
      \ chunk types (e.g., ['repo_core', 'note_section'])\n            prioritize_chunks:\
      \ If True, prioritize chunks over full documents in ranking\n\n        Returns:\n\
      \            Dictionary with answer, retrieved documents/chunks, and metadata"
