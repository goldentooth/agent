classes:
- name: MockLLMClient
  docstring: "Mock LLM client for testing purposes.\n\n    This client simulates LLM\
    \ responses for testing the Instructor integration\n    without requiring actual\
    \ API calls."
  methods:
  - create_completion
  public: true
- name: InstructorFlow
  docstring: "Flow-based wrapper for Instructor-powered structured LLM output.\n\n\
    \    InstructorFlow integrates with the FlowAgent system to provide structured\n\
    \    LLM output using Instructor's validation and parsing capabilities."
  methods:
  - as_flow
  public: true
- name: FlowAgent
  docstring: "Flow-based agent using functional composition.\n\n    FlowAgent implements\
    \ a complete agent pipeline that:\n    1. Validates input schemas\n    2. Converts\
    \ input to context\n    3. Runs system flow (prompt generation, memory, etc.)\n\
    \    4. Runs processing flow (LLM calls, tool execution, etc.)\n    5. Extracts\
    \ and validates output schemas"
  methods:
  - as_flow
  public: true
- name: FlowTool
  docstring: "Flow-based tool with agent-like interface.\n\n    FlowTool provides\
    \ a unified interface for tools that can be used as flows\n    or converted to\
    \ agent-compatible interfaces."
  methods:
  - as_flow
  - as_agent
  public: true
- name: FlowIOSchema
  docstring: Base schema for all Flow-based agent interactions with context integration.
  methods:
