  docstring: "Create a Flow that filters events based on a predicate.\n\n    Args:\n\
    \        event_name: Name of the event to listen for\n        predicate: Function\
    \ to filter events with\n        use_async: Whether to use async event emitter\
    \ (default: True)\n\n    Returns:\n        Flow that yields only events matching\
    \ the predicate"
  public: true
- name: event_transform
