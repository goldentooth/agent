- name: event_source
  signature: 'def event_source(event_name: str, use_async: bool) -> AnyFlow'
  docstring: "Create a Flow that emits events from the specified event name.\n\n \
    \   Args:\n        event_name: Name of the event to listen for\n        use_async:\
    \ Whether to use async event emitter (default: True)\n\n    Returns:\n       \
    \ Flow that yields events as they are emitted"
  public: true
- name: event_sink
  signature: 'def event_sink(event_name: str, use_async: bool) -> Flow[T, T]'
  docstring: "Create a Flow that emits each item it receives as an event.\n\n    Args:\n\
    \        event_name: Name of the event to emit\n        use_async: Whether to\
    \ use async event emitter (default: True)\n\n    Returns:\n        Flow that emits\
    \ events and passes items through unchanged"
  public: true
- name: event_bridge
  signature: 'def event_bridge(from_event: str, to_event: str, use_async: bool) ->
    Flow[None, None]'
  docstring: "Create a Flow that bridges events from one event name to another.\n\n\
    \    Args:\n        from_event: Source event name to listen for\n        to_event:\
    \ Target event name to emit to\n        use_async: Whether to use async event\
    \ emitter (default: True)\n\n    Returns:\n        Flow that forwards events from\
    \ source to target"
  public: true
- name: event_filter
  signature: 'def event_filter(event_name: str, predicate: Callable[[T], bool], use_async:
