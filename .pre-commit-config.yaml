# Pre-commit hooks configuration
# This ensures code quality checks run before every commit

repos:
  # Standard pre-commit hooks for basic code quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        description: Remove trailing whitespace
        exclude: ^(old/|docs/)
      - id: end-of-file-fixer
        description: Ensure files end with newline
        exclude: ^(old/|docs/)
      - id: check-yaml
        description: Validate YAML syntax
        exclude: ^old/
      - id: check-json
        description: Validate JSON syntax
        exclude: ^old/
      - id: check-toml
        description: Validate TOML syntax
        exclude: ^old/
      - id: check-merge-conflict
        description: Check for merge conflict markers
        exclude: ^old/
      - id: check-added-large-files
        description: Prevent large files from being committed
        args: ['--maxkb=1000']
        exclude: ^old/
      - id: debug-statements
        description: Check for debugger statements
        exclude: ^old/
      - id: check-case-conflict
        description: Check for case conflicts in filenames
        exclude: ^old/

  # Python-specific code formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        description: Format Python code with Black
        language_version: python3
        args: ['--line-length=88']
        exclude: ^old/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        description: Sort Python imports
        args: ['--profile=black']
        exclude: ^old/

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        description: Run Ruff linter
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^old/

  # Update module metadata for changed modules (auto-fixes stale metadata)
  - repo: local
    hooks:
      - id: update-module-metadata
        name: Update Module Metadata
        entry: poetry run goldentooth-agent dev module pre-commit-update
        language: system
        types: [python]
        description: Update README.meta.yaml for modules with staged changes
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

  # Type checking with MyPy
  - repo: local
    hooks:
      - id: mypy
        name: MyPy Type Check
        entry: poetry run mypy
        language: system
        types: [python]
        args: ['src/goldentooth_agent', '--strict', '--show-error-codes', '--pretty']
        description: Run MyPy type checking
        pass_filenames: false
        always_run: true

  # Note: Pyright (Pylance equivalent) can be enabled but requires additional setup
  # Uncomment the below section if you want more sophisticated type checking
  # - repo: https://github.com/RobertCraigie/pyright-python
  #   rev: v1.1.390
  #   hooks:
  #     - id: pyright
  #       description: Run Pyright type checking (Pylance equivalent)
  #       args: ['--pythonpath=src', '--project=pyproject.toml']
  #       additional_dependencies: []
  #       pass_filenames: false

  # Generate README.md files from metadata (auto-fixes stale READMEs)
  - repo: local
    hooks:
      - id: update-readme-files
        name: Update README Files
        entry: poetry run goldentooth-agent dev module generate-readme-for-commit
        language: system
        description: Generate README.md files from README.meta.yaml for staged modules
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

  # Validate module metadata before running tests
  - repo: local
    hooks:
      - id: validate-module-metadata
        name: Validate Module Metadata
        entry: poetry run goldentooth-agent dev module validate-for-commit
        language: system
        description: Validate metadata accuracy for staged modules before commit
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

  # Check for missing background files in significant modules
  - repo: local
    hooks:
      - id: check-background-files
        name: Check Background Files
        entry: poetry run goldentooth-agent dev module check-background-for-commit
        language: system
        description: Check for missing README.bg.md files in significant modules with changes
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

  # Build Sphinx documentation
  - repo: local
    hooks:
      - id: sphinx-build
        name: Build Sphinx Documentation
        entry: poetry run sphinx-build
        language: system
        args: ['-W', '-b', 'html', 'docs', 'docs/_build']
        description: Build Sphinx documentation and fail on warnings
        files: '(\.py|\.rst|\.md)$'
        pass_filenames: false
        always_run: false

  # Run pytest tests
  - repo: local
    hooks:
      - id: pytest
        name: PyTest
        entry: poetry run pytest
        language: system
        types: [python]
        description: Run pytest tests
        pass_filenames: false
        always_run: true
        args: ['tests/', '-v', '--tb=short']

  # Optional: Additional security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        description: Run Bandit security linter
        args: ['-r', 'src/', '-ll']
        exclude: (tests/|old/)
        pass_filenames: false

# Configuration for individual hooks
default_language_version:
  python: python3.13

# Global settings
fail_fast: false
default_stages: [pre-commit]
