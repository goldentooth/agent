[vulture]
# Vulture configuration for goldentooth-agent

# Minimum confidence for reporting dead code
min_confidence = 80

# Paths to scan
paths = ["src/goldentooth_agent"]

# Paths to ignore
ignore_names = [
    # CLI command functions - may be called via typer decorators
    "*_command",
    "*_cmd",
    # Entry points and main functions
    "main",
    "app",
    "cli",
    # Exception classes that may be imported but not instantiated
    "*Error",
    "*Exception",
    # Pydantic model fields that appear unused but are accessed via __dict__
    "*_field",
    # Test-related functions
    "test_*",
    "Test*",
    "*_test",
    # Configuration and setup functions
    "*Config*",
    "*_config",
    "setup_*",
    "configure_*",
    # Protocol and interface definitions
    "*Protocol",
    "*Interface",
    # Type definitions
    "*Type",
    "*Dict",
    # Dependency injection related
    "inject*",
    "*_injectable",
    # CLI commands defined with decorators
    "list_*",
    "show_*",
    "run_*",
    "demo_*",
    "describe_*",
    "exec_*",
    "query_*"
]

# Files to ignore completely
ignore_files = [
    "*/examples/*",
    "*/test_*",
    "*_test.py"
]

# Exclude certain directories
exclude = [
    "tests/",
    "examples/",
    "build/",
    "dist/",
    "__pycache__/"
]
